name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          pip install --upgrade pip
          pip install ruff black isort
      - name: Ruff
        run: ruff check cortex tests
      - name: Black
        run: black --check cortex tests
      - name: Isort
        run: isort --check-only cortex tests

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy cortex

  test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (skip GPU)
        run: pytest tests -v -m "not gpu and not slow" --cov=cortex --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
